
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>驻令台</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --warning: #f59e0b;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --modal-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
      flex-grow: 1;
      width: 100%;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      border-bottom: 1px solid #dee2e6;
    }
    
    .header-titles {
      padding-bottom: 1.25rem;
    }
    
    .header-titles h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }
    
    .header-titles p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Tabs */
    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: -1px;
    }

    .nav-link {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 0.75rem 1.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-link:hover {
      color: var(--text-main);
      border-bottom-color: var(--border);
    }

    .nav-link.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
    }
    
    .card-title {
      font-weight: 600;
      font-size: 1.05rem;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .card-body {
      padding: 1.5rem;
    }
    
    .card-body-no-pad {
      padding: 0;
    }
    
    /* Task List */
    .task-item {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr) minmax(0, 1.2fr) auto;
      gap: 1rem;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
    }
    
    .task-item:last-child {
      border-bottom: none;
    }
    
    .task-item:hover {
      background-color: #f8f9fa;
    }
    
    .task-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
      color: var(--primary);
    }
    
    .task-desc, .task-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.35em 0.65em;
      font-size: 0.75em;
      font-weight: 600;
      border-radius: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .status-running { background: #dcfce7; color: #166534; }
    .status-starting, .status-stopping { background: #fef9c3; color: #854d0e; }
    .status-stopped, .status-exited { background: #f3f4f6; color: #374151; }
    .status-failed { background: #fee2e2; color: #991b1b; }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      color: var(--text-main);
      text-decoration: none;
    }
    
    .btn:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    
    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      color: white;
    }
    
    .btn-danger {
      background: #fff;
      border-color: #fca5a5;
      color: var(--danger);
    }
    
    .btn-danger:hover:not(:disabled) {
      background: var(--danger);
      color: white;
    }
    
    .btn-sm {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 4px;
    }
    
    .actions-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: #f8fafc;
      flex-wrap: wrap;
    }

    .pagination-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .pagination-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-main);
    }
    
    .form-control {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.5;
      color: var(--text-main);
      background-color: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    
    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .form-control:focus {
      outline: 0;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    
    .form-control:disabled {
      background-color: #e9ecef;
      opacity: 1;
    }
    
    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      background-size: 16px 12px;
      padding-right: 2.25rem;
    }
    
    .form-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    .form-check-input {
      width: 1rem;
      height: 1rem;
      margin: 0;
      background-color: #fff;
      border: 1px solid #adb5bd;
      border-radius: 0.25em;
      cursor: pointer;
    }
    
    .form-check-input:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }
    
    .form-check-label {
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }
    
    /* Logs */
    .logs-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
      background: #f8fafc;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    
    .toolbar-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toolbar-item-grow {
      flex: 1 1 240px;
      min-width: 220px;
    }

    .task-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .task-toolbar-search {
      flex: 1 1 260px;
      min-width: 220px;
    }

    .system-card {
      margin-bottom: 1rem;
    }

    .system-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .system-meta {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .log-viewer {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      padding: 1rem;
      border-radius: 6px;
      height: 550px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    .ansi-bold { font-weight: 700; }
    .ansi-dim { opacity: 0.72; }
    .ansi-italic { font-style: italic; }
    .ansi-underline { text-decoration: underline; }
    .ansi-fg-30 { color: #111827; }
    .ansi-fg-31 { color: #f87171; }
    .ansi-fg-32 { color: #4ade80; }
    .ansi-fg-33 { color: #fbbf24; }
    .ansi-fg-34 { color: #60a5fa; }
    .ansi-fg-35 { color: #f472b6; }
    .ansi-fg-36 { color: #22d3ee; }
    .ansi-fg-37 { color: #e5e7eb; }
    .ansi-fg-90 { color: #9ca3af; }
    .ansi-fg-91 { color: #fca5a5; }
    .ansi-fg-92 { color: #86efac; }
    .ansi-fg-93 { color: #fcd34d; }
    .ansi-fg-94 { color: #93c5fd; }
    .ansi-fg-95 { color: #f9a8d4; }
    .ansi-fg-96 { color: #67e8f9; }
    .ansi-fg-97 { color: #f9fafb; }
    .ansi-bg-40 { background: #111827; }
    .ansi-bg-41 { background: #7f1d1d; }
    .ansi-bg-42 { background: #14532d; }
    .ansi-bg-43 { background: #78350f; }
    .ansi-bg-44 { background: #1e3a8a; }
    .ansi-bg-45 { background: #831843; }
    .ansi-bg-46 { background: #155e75; }
    .ansi-bg-47 { background: #d1d5db; color: #111827; }
    .ansi-bg-100 { background: #4b5563; }
    .ansi-bg-101 { background: #991b1b; }
    .ansi-bg-102 { background: #166534; }
    .ansi-bg-103 { background: #92400e; }
    .ansi-bg-104 { background: #1d4ed8; }
    .ansi-bg-105 { background: #9d174d; }
    .ansi-bg-106 { background: #0e7490; }
    .ansi-bg-107 { background: #f3f4f6; color: #111827; }
    
    .error-text {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 0.35rem;
      word-break: break-word;
      display: block;
    }
    
    .empty-state {
      padding: 4rem;
      text-align: center;
      color: var(--text-muted);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      z-index: 1040;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
    }
    .modal-backdrop.show {
      display: flex;
      opacity: 1;
    }

    .modal-dialog {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--modal-shadow);
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      transform: translateY(-20px);
      transition: transform 0.2s ease-in-out;
    }
    .modal-backdrop.show .modal-dialog {
      transform: translateY(0);
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
    }
    .modal-close:hover {
      color: var(--text-main);
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .modal-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      background: #f8fafc;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
    }

    /* Footer */
    .site-footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      background-color: rgba(255, 255, 255, 0.5);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    .footer-left {
      /* Empty for balance */
    }
    
    .footer-center {
      text-align: center;
    }
    
    .footer-right {
      text-align: right;
    }

    .version-badge {
      display: inline-block;
      background: var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text-main);
    }
    
    @media (max-width: 992px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .nav-tabs {
        width: 100%;
      }
      .task-item {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .actions-group {
        justify-content: flex-start;
        margin-top: 0.5rem;
      }
      .footer-inner {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .footer-left {
        display: none;
      }
      .footer-right, .footer-center {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-titles">
        <h1>驻令台</h1>
        <p style="margin:0;">托盘负责快速控制，浏览器负责命令管理与日志查看。</p>
      </div>
      
      <!-- Tabs Navigation -->
      <div class="nav-tabs">
        <button class="nav-link active" onclick="switchTab('tasks')" id="tab-btn-tasks">
          <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          任务列表
        </button>
        <button class="nav-link" onclick="switchTab('logs')" id="tab-btn-logs">
          <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          日志查看
        </button>
      </div>
    </div>

    <!-- Tab 1: Task List -->
    <div class="tab-content active" id="tab-tasks">
      <div class="card system-card">
        <div class="card-body">
          <div class="system-row">
            <div>
              <div class="card-title">软件开机自启</div>
              <div class="system-meta" id="autostart-summary">加载中...</div>
              <div class="system-meta">检测结果会写入 `data/app.log`</div>
            </div>
            <div class="actions-group">
              <button class="btn btn-sm" id="autostart-refresh">刷新</button>
              <button class="btn btn-sm btn-primary" id="autostart-enable">启用</button>
              <button class="btn btn-sm btn-danger" id="autostart-disable">停用</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            所有任务
          </div>
          <div class="task-toolbar">
            <div class="task-toolbar-search">
              <input id="task-search" class="form-control" placeholder="搜索任务名称、ID、命令或工作目录">
            </div>
            <button class="btn btn-sm" onclick="exportTasks()">
              导出任务
            </button>
            <label class="btn btn-sm" for="task-import-file" style="margin:0;">
              导入任务
            </label>
            <input id="task-import-file" type="file" accept="application/json" style="display:none;">
            <button class="btn btn-sm btn-primary" onclick="openNewTaskModal()">
              <svg style="width:14px;height:14px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加任务
            </button>
            <button class="btn btn-sm" onclick="loadTasks()">
              <svg style="width:14px;height:14px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              刷新
            </button>
          </div>
        </div>
        <div class="card-body card-body-no-pad" id="task-list">
          <div class="empty-state">加载中...</div>
        </div>
        <div class="pagination-bar">
          <div class="pagination-meta" id="task-pagination-meta">共 0 个任务</div>
          <div class="pagination-actions">
            <select id="task-page-size" class="form-control form-select" style="width:auto;">
              <option value="10">10 / 页</option>
              <option value="20">20 / 页</option>
              <option value="50">50 / 页</option>
            </select>
            <button class="btn btn-sm" id="task-page-prev">上一页</button>
            <span class="pagination-meta" id="task-page-indicator">第 1 / 1 页</span>
            <button class="btn btn-sm" id="task-page-next">下一页</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 2: Logs -->
    <div class="tab-content" id="tab-logs">
      <div class="card">
        <div class="card-body">
          <div class="logs-toolbar">
            <div class="toolbar-item toolbar-item-grow">
              <input id="log-task-filter" class="form-control" placeholder="筛选任务名称或 ID">
            </div>
            <div class="toolbar-item">
              <select id="log-task" class="form-control form-select" style="width: auto; min-width: 200px;"></select>
            </div>
            <div class="toolbar-item">
              <span class="system-meta">任务日志</span>
            </div>
            <div class="toolbar-item">
              <select id="log-render-mode" class="form-control form-select" style="width: auto;">
                <option value="ansi">彩色渲染</option>
                <option value="plain">纯文本</option>
              </select>
            </div>
            <div class="toolbar-item">
              <label class="form-check-label" style="display:flex;align-items:center;gap:4px;">
                <input id="log-auto-refresh" type="checkbox" class="form-check-input" checked>
                自动刷新
              </label>
            </div>
            <div class="toolbar-item">
              <label class="form-check-label" style="display:flex;align-items:center;gap:4px;">
                <input id="log-follow" type="checkbox" class="form-check-input" checked>
                跟随到底部
              </label>
            </div>
            <div style="flex-grow: 1;"></div>
            <button class="btn btn-sm" onclick="loadLogs()">读取</button>
            <button class="btn btn-sm" onclick="downloadLogs()">下载</button>
            <button class="btn btn-sm btn-danger" onclick="clearLogs()">清空</button>
          </div>
          <pre id="logs" class="log-viewer"></pre>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left"></div>
      <div class="footer-center">
        &copy; <span id="current-year"></span> 驻令台
      </div>
      <div class="footer-right">
        <span class="version-badge" id="app-version">获取中...</span>
      </div>
    </div>
  </footer>

  <!-- Task Edit Modal -->
  <div id="task-modal" class="modal-backdrop" onclick="handleBackdropClick(event)">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">新增任务</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="task-id">任务 ID</label>
          <input id="task-id" class="form-control" placeholder="例如: openlist">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-name">显示名称</label>
          <input id="task-name" class="form-control" placeholder="例如: OpenList 服务">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-program">可执行程序</label>
          <input id="task-program" class="form-control" placeholder="例如: D:\SoftWare\openlist.exe">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-args">运行参数</label>
          <input id="task-args" class="form-control" placeholder="例如: server --port 5244">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-workdir">工作目录</label>
          <input id="task-workdir" class="form-control" placeholder="留空则使用当前目录">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-env">环境变量</label>
          <textarea id="task-env" class="form-control" rows="4" placeholder="每行一个，格式 KEY=VALUE，例如:&#10;PORT=8080&#10;NODE_ENV=production"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="task-timeout">停止超时 (秒)</label>
          <input id="task-timeout" class="form-control" type="number" min="1" placeholder="留空则默认 8">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-restart-delay">重启延迟 (秒)</label>
          <input id="task-restart-delay" class="form-control" type="number" min="0" placeholder="留空则默认 2">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-max-restart-count">最大自动重启次数</label>
          <input id="task-max-restart-count" class="form-control" type="number" min="0" placeholder="留空则默认 0">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-health-url">健康检查 URL</label>
          <input id="task-health-url" class="form-control" placeholder="例如: http://127.0.0.1:5244/health">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-health-interval">健康检查间隔 (秒)</label>
          <input id="task-health-interval" class="form-control" type="number" min="1" placeholder="启用健康检查时默认 10">
        </div>
        <div class="form-group">
          <label class="form-label" for="task-health-threshold">连续失败阈值</label>
          <input id="task-health-threshold" class="form-control" type="number" min="1" placeholder="启用健康检查时默认 3">
        </div>
        
        <div class="form-check">
          <input id="task-autostart" type="checkbox" class="form-check-input">
          <label class="form-check-label" for="task-autostart">跟随托盘自动启动</label>
        </div>
        <div class="form-check">
          <input id="task-restart" type="checkbox" class="form-check-input">
          <label class="form-check-label" for="task-restart">异常退出后自动重启</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveTask()">保存任务</button>
      </div>
    </div>
  </div>

  <script>
    const SYSTEM_LOG_ID = '__system__';
    let currentTasks = [];
    let editingTaskId = '';
    let actionInFlight = new Set();
    let currentTaskPage = 1;
    let currentTaskPageSize = 10;
    let pendingTaskFocusId = '';
    let tasksEventSource = null;
    let logsEventSource = null;
    let currentLogStreamKey = '';
    let currentTaskSearch = '';
    let currentAutoStartStatus = null;
    let currentLogRenderMode = localStorage.getItem('log-render-mode') || 'ansi';

    document.getElementById('current-year').textContent = new Date().getFullYear();

    async function api(url, options = {}) {
      try {
        const res = await fetch(url, options);
        return await res.json();
      } catch (err) {
        console.error(err);
        return { code: -1, msg: err.message };
      }
    }

    function escapeHTML(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function ansiStateToClassNames(state) {
      const classes = [];
      if (state.bold) classes.push('ansi-bold');
      if (state.dim) classes.push('ansi-dim');
      if (state.italic) classes.push('ansi-italic');
      if (state.underline) classes.push('ansi-underline');
      if (state.fg) classes.push('ansi-fg-' + state.fg);
      if (state.bg) classes.push('ansi-bg-' + state.bg);
      return classes;
    }

    function cloneAnsiState(state) {
      return {
        bold: !!state.bold,
        dim: !!state.dim,
        italic: !!state.italic,
        underline: !!state.underline,
        fg: state.fg || '',
        bg: state.bg || ''
      };
    }

    function applyAnsiCode(state, code) {
      switch (code) {
        case 0:
          state.bold = false;
          state.dim = false;
          state.italic = false;
          state.underline = false;
          state.fg = '';
          state.bg = '';
          return;
        case 1:
          state.bold = true;
          return;
        case 2:
          state.dim = true;
          return;
        case 3:
          state.italic = true;
          return;
        case 4:
          state.underline = true;
          return;
        case 22:
          state.bold = false;
          state.dim = false;
          return;
        case 23:
          state.italic = false;
          return;
        case 24:
          state.underline = false;
          return;
        case 39:
          state.fg = '';
          return;
        case 49:
          state.bg = '';
          return;
      }

      if ((code >= 30 && code <= 37) || (code >= 90 && code <= 97)) {
        state.fg = String(code);
        return;
      }
      if ((code >= 40 && code <= 47) || (code >= 100 && code <= 107)) {
        state.bg = String(code);
      }
    }

    function stripAnsiCodes(content) {
      return String(content || '').replace(/\u001b\[[0-9;?]*[ -/]*[@-~]/g, '');
    }

    function renderAnsiHTML(content) {
      const input = String(content || '');
      if (!input) {
        return '';
      }

      const ansiPattern = /\u001b\[([0-9;]*)m/g;
      let result = '';
      let lastIndex = 0;
      let match;
      const state = { bold: false, dim: false, italic: false, underline: false, fg: '', bg: '' };

      while ((match = ansiPattern.exec(input)) !== null) {
        if (match.index > lastIndex) {
          result += wrapAnsiSegment(input.slice(lastIndex, match.index), cloneAnsiState(state));
        }

        const rawCodes = match[1] === '' ? ['0'] : match[1].split(';');
        rawCodes.forEach((item) => {
          const code = parseInt(item, 10);
          if (!Number.isNaN(code)) {
            applyAnsiCode(state, code);
          }
        });
        lastIndex = ansiPattern.lastIndex;
      }

      if (lastIndex < input.length) {
        result += wrapAnsiSegment(input.slice(lastIndex), cloneAnsiState(state));
      }

      return result;
    }

    function wrapAnsiSegment(text, state) {
      if (!text) {
        return '';
      }

      const escaped = escapeHTML(text);
      const classes = ansiStateToClassNames(state);
      if (classes.length === 0) {
        return escaped;
      }
      return '<span class="' + classes.join(' ') + '">' + escaped + '</span>';
    }

    function setLogContent(content) {
      const logsEl = document.getElementById('logs');
      const text = String(content || '');
      if (currentLogRenderMode === 'plain') {
        logsEl.textContent = stripAnsiCodes(text);
        return;
      }
      logsEl.innerHTML = renderAnsiHTML(text);
    }

    function isRunningStatus(status) {
      return status === 'running' || status === 'starting' || status === 'stopping';
    }

    function splitArgs(input) {
      return String(input || '')
        .trim()
        .split(/\s+/)
        .filter(Boolean);
    }

    function parseEnvLines(input) {
      return String(input || '')
        .split(/\r?\n/)
        // Only strip leading whitespace/indentation. Environment values may end
        // with meaningful spaces, so we must not trim the right side of the line.
        .map((line) => line.replace(/^\s+/, ''))
        .filter((line) => line && !line.startsWith('#'));
    }

    function formatEnvLines(env) {
      return (env || []).join('\n');
    }

    function clampTaskPage(page, totalItems = currentTasks.length) {
      const totalPages = Math.max(1, Math.ceil(totalItems / currentTaskPageSize));
      if (page < 1) return 1;
      if (page > totalPages) return totalPages;
      return page;
    }

    function getFilteredTasks() {
      const keyword = String(currentTaskSearch || '').trim().toLowerCase();
      if (!keyword) {
        return currentTasks;
      }
      return currentTasks.filter((item) => {
        const task = item.task || {};
        const haystack = [
          task.id,
          task.name,
          task.program,
          (task.args || []).join(' '),
          task.workdir
        ].join(' ').toLowerCase();
        return haystack.includes(keyword);
      });
    }

    function getFilteredLogTasks() {
      const keyword = String(document.getElementById('log-task-filter').value || '').trim().toLowerCase();
      const systemItem = {
        id: SYSTEM_LOG_ID,
        name: '系统日志',
        match: ['系统日志', 'app.log', '系统', 'app'].join(' ').toLowerCase()
      };
      const taskItems = currentTasks.map((item) => ({
        id: item.task.id,
        name: item.task.name,
        task: item.task,
        match: [item.task.name, item.task.id].join(' ').toLowerCase()
      }));

      if (!keyword) {
        return [systemItem].concat(taskItems);
      }
      return [systemItem].concat(taskItems).filter((item) => item.match.includes(keyword));
    }

    function updateTaskPagination(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / currentTaskPageSize));
      currentTaskPage = clampTaskPage(currentTaskPage, totalItems);

      document.getElementById('task-pagination-meta').textContent = '共 ' + totalItems + ' 个任务';
      document.getElementById('task-page-indicator').textContent = '第 ' + currentTaskPage + ' / ' + totalPages + ' 页';
      document.getElementById('task-page-prev').disabled = currentTaskPage <= 1;
      document.getElementById('task-page-next').disabled = currentTaskPage >= totalPages;
      document.getElementById('task-page-size').value = String(currentTaskPageSize);
    }

    function populateLogTaskOptions() {
      const taskSelect = document.getElementById('log-task');
      const currentLogTask = taskSelect.value;
      const filteredTasks = getFilteredLogTasks();

      taskSelect.innerHTML = '';
      filteredTasks.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.id === SYSTEM_LOG_ID ? '系统日志 (app.log)' : item.name + ' (' + item.id + ')';
        taskSelect.appendChild(option);
      });

      if (filteredTasks.length === 0) {
        disconnectLogStream();
        taskSelect.value = '';
        return;
      }

      if (currentLogTask && filteredTasks.some((x) => x.id === currentLogTask)) {
        taskSelect.value = currentLogTask;
      } else {
        taskSelect.value = filteredTasks[0].id;
      }
    }

    function renderAutoStartStatus(status) {
      currentAutoStartStatus = status || null;
      const summary = document.getElementById('autostart-summary');
      const enableBtn = document.getElementById('autostart-enable');
      const disableBtn = document.getElementById('autostart-disable');

      if (!status) {
        summary.textContent = '无法获取开机自启状态';
        enableBtn.disabled = true;
        disableBtn.disabled = true;
        return;
      }

      if (!status.supported) {
        summary.textContent = status.message || '当前平台不支持网页控制开机自启';
        enableBtn.disabled = true;
        disableBtn.disabled = true;
        return;
      }

      let text = '状态: ' + (status.enabled ? '已启用' : '未启用');
      if (status.unit_path) {
        text += ' | ' + status.unit_path;
      }
      summary.textContent = text;
      enableBtn.disabled = !!status.enabled;
      disableBtn.disabled = !status.enabled;
    }

    async function loadAutoStartStatus() {
      const data = await api('/api/autostart');
      if (data && data.code === 0) {
        renderAutoStartStatus(data.data || null);
        return;
      }
      renderAutoStartStatus(null);
    }

    async function updateAutoStart(action) {
      const data = await api('/api/autostart/' + action, { method: 'POST' });
      if (!data || data.code !== 0) {
        alert((data && data.msg) || '操作失败');
        return;
      }
      renderAutoStartStatus(data.data || null);
    }

    // Tabs Control
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      
      document.getElementById('tab-' + tabId).classList.add('active');
      document.getElementById('tab-btn-' + tabId).classList.add('active');

      if (tabId === 'logs') {
        loadLogs();
        connectLogStream();
      } else {
        disconnectLogStream();
      }
    }

    // Modal Control
    function openModal() {
      const modal = document.getElementById('task-modal');
      modal.style.display = 'flex';
      // Trigger reflow for transition
      modal.offsetHeight;
      modal.classList.add('show');
    }

    function closeModal() {
      const modal = document.getElementById('task-modal');
      modal.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
      }, 200);
    }

    function handleBackdropClick(e) {
      if (e.target.id === 'task-modal') {
        closeModal();
      }
    }

    function openNewTaskModal() {
      editingTaskId = '';
      document.getElementById('modal-title').innerHTML = '<svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> 新增任务';
      document.getElementById('task-id').disabled = false;
      document.getElementById('task-id').value = '';
      document.getElementById('task-name').value = '';
      document.getElementById('task-program').value = '';
      document.getElementById('task-args').value = '';
      document.getElementById('task-workdir').value = '';
      document.getElementById('task-env').value = '';
      document.getElementById('task-timeout').value = '';
      document.getElementById('task-restart-delay').value = '';
      document.getElementById('task-max-restart-count').value = '';
      document.getElementById('task-health-url').value = '';
      document.getElementById('task-health-interval').value = '';
      document.getElementById('task-health-threshold').value = '';
      document.getElementById('task-autostart').checked = false;
      document.getElementById('task-restart').checked = false;
      openModal();
    }

    function openEditTaskModal(task) {
      editingTaskId = task.id;
      document.getElementById('modal-title').innerHTML = '<svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 编辑任务: ' + escapeHTML(task.name);
      document.getElementById('task-id').value = task.id || '';
      document.getElementById('task-id').disabled = true;
      document.getElementById('task-name').value = task.name || '';
      document.getElementById('task-program').value = task.program || '';
      document.getElementById('task-args').value = (task.args || []).join(' ');
      document.getElementById('task-workdir').value = task.workdir || '';
      document.getElementById('task-env').value = formatEnvLines(task.env);
      document.getElementById('task-timeout').value = task.stop_timeout_sec || 8;
      document.getElementById('task-restart-delay').value = task.restart_delay_sec || 2;
      document.getElementById('task-max-restart-count').value = task.max_restart_count || 0;
      document.getElementById('task-health-url').value = task.health_check_url || '';
      document.getElementById('task-health-interval').value = task.health_check_interval_sec || 10;
      document.getElementById('task-health-threshold').value = task.health_check_failure_threshold || 3;
      document.getElementById('task-autostart').checked = !!task.autostart;
      document.getElementById('task-restart').checked = !!task.restart_on_crash;
      openModal();
    }

    function renderTasks(items) {
      const root = document.getElementById('task-list');
      currentTasks = items;
      const filteredItems = getFilteredTasks();

      if (pendingTaskFocusId) {
        const targetIndex = filteredItems.findIndex((item) => item.task.id === pendingTaskFocusId);
        if (targetIndex >= 0) {
          currentTaskPage = Math.floor(targetIndex / currentTaskPageSize) + 1;
        }
        pendingTaskFocusId = '';
      }

      updateTaskPagination(filteredItems.length);

      if (items.length === 0) {
        root.innerHTML = '<div class="empty-state">暂无任务，请点击右上方“添加任务”按钮。</div>';
        populateLogTaskOptions();
        return;
      }

      if (filteredItems.length === 0) {
        root.innerHTML = '<div class="empty-state">没有找到匹配的任务，请调整搜索条件。</div>';
        populateLogTaskOptions();
        return;
      }

      root.innerHTML = '';

      const start = (currentTaskPage - 1) * currentTaskPageSize;
      const pageItems = filteredItems.slice(start, start + currentTaskPageSize);

      pageItems.forEach(item => {
        const status = item.status.status || 'stopped';
        const isRunning = isRunningStatus(status);
        const toggleAction = isRunning ? 'stop' : 'start';
        const busy = actionInFlight.has(item.task.id);
        
        let toggleIcon = isRunning 
          ? '<svg style="width:14px;height:14px;margin-right:4px;" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>'
          : '<svg style="width:14px;height:14px;margin-right:4px;" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        const toggleLabel = isRunning ? '停止' : '启动';
        const toggleClass = isRunning ? 'btn-danger' : 'btn-primary';
        const healthSummary = item.task.health_check_url
          ? escapeHTML(item.task.health_check_url) + ' / ' +
            escapeHTML(String(item.task.health_check_interval_sec || 10)) + 's / ' +
            escapeHTML(String(item.task.health_check_failure_threshold || 3)) + '次'
          : '未启用';

        const lastError = item.status.last_error ? '<span class="error-text" title="' + escapeHTML(item.status.last_error) + '">' + escapeHTML(item.status.last_error) + '</span>' : '';
        const disabledActions = isRunning || busy;

        const row = document.createElement('div');
        row.className = 'task-item';
        row.innerHTML =
          '<div>' +
            '<div class="task-name">' + escapeHTML(item.task.name) + ' <span style="color:var(--text-muted);font-weight:normal;font-size:0.85rem;">(' + escapeHTML(item.task.id) + ')</span></div>' +
            '<div class="task-desc" title="' + escapeHTML(item.task.program) + ' ' + escapeHTML((item.task.args || []).join(' ')) + '">' + 
               '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>' +
               escapeHTML(item.task.program) + ' ' + escapeHTML((item.task.args || []).join(' ')) + 
            '</div>' +
            '<div class="task-meta" title="' + escapeHTML(item.task.workdir || '.') + '">' + 
               '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>' +
               escapeHTML(item.task.workdir || '当前目录') + 
            '</div>' +
          '</div>' +
          '<div>' +
            '<div class="badge status-' + status + '">' + status + '</div>' +
            (item.status.pid ? '<div class="task-meta" style="margin-top:4px;">PID: ' + item.status.pid + '</div>' : '') +
            lastError +
          '</div>' +
          '<div>' +
            '<div class="task-meta">自动启动: <strong>' + (item.task.autostart ? '是' : '否') + '</strong></div>' +
            '<div class="task-meta" style="margin-top:4px;">异常重启: <strong>' + (item.task.restart_on_crash ? '是' : '否') + '</strong></div>' +
            '<div class="task-meta" style="margin-top:4px;">重启策略: <strong>' + escapeHTML(String(item.task.restart_delay_sec || 2)) + 's / ' + escapeHTML(String(item.task.max_restart_count || 0)) + '次</strong></div>' +
            '<div class="task-meta" style="margin-top:4px;">健康检查: <strong>' + healthSummary + '</strong></div>' +
          '</div>' +
          '<div class="actions-group">' +
            '<button class="btn btn-sm ' + toggleClass + '" data-id="' + item.task.id + '" data-action="' + toggleAction + '"' + (busy ? ' disabled' : '') + '>' + (busy ? '处理中...' : toggleIcon + toggleLabel) + '</button>' +
            '<button class="btn btn-sm" data-id="' + item.task.id + '" data-action="restart"' + (busy ? ' disabled' : '') + '>重启</button>' +
            '<button class="btn btn-sm" data-id="' + item.task.id + '" data-action="edit"' + (disabledActions ? ' disabled title="运行中不可编辑"' : '') + '>编辑</button>' +
            '<button class="btn btn-sm btn-danger" data-id="' + item.task.id + '" data-action="delete"' + (disabledActions ? ' disabled title="运行中不可删除"' : '') + '>删除</button>' +
            '<button class="btn btn-sm" data-id="' + item.task.id + '" data-action="logs">看日志</button>' +
          '</div>';
        root.appendChild(row);
      });

      populateLogTaskOptions();

      const currentLogTarget = document.getElementById('log-task').value;
      if (currentLogTarget !== SYSTEM_LOG_ID && !currentTasks.some(x => x.task.id === currentLogTarget)) {
        disconnectLogStream();
      } else if (document.getElementById('tab-logs').classList.contains('active') && document.getElementById('log-auto-refresh').checked) {
        connectLogStream();
      }

      root.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (btn.disabled) return;
          
          const id = btn.dataset.id;
          const action = btn.dataset.action;

          if (action === 'logs') {
            document.getElementById('log-task').value = id;
            switchTab('logs');
            return;
          }

          if (action === 'edit') {
            const item = currentTasks.find(x => x.task.id === id);
            if (item) openEditTaskModal(item.task);
            return;
          }

          if (action === 'delete') {
            if (!confirm('确认删除任务 "' + id + '" 吗？')) return;
            const result = await api('/api/tasks/' + id, { method: 'DELETE' });
            if (result.code !== 0) {
              alert(result.msg || '删除失败');
              return;
            }
            await loadTasks();
            await loadLogs();
            if (editingTaskId === id) closeModal();
            return;
          }

          // start or stop
          actionInFlight.add(id);
          await loadTasks();
          try {
            const result = await api('/api/tasks/' + id + '/' + action, { method: 'POST' });
            if (result.code !== 0) {
              alert(result.msg || '操作失败');
            }
          } finally {
            actionInFlight.delete(id);
            await loadTasks();
            await loadLogs();
          }
        });
      });
    }

    async function saveTask() {
      const id = document.getElementById('task-id').value.trim();
      if (!id) {
        alert("请输入任务 ID");
        return;
      }
      
      const payload = {
        id: id,
        name: document.getElementById('task-name').value.trim() || id,
        program: document.getElementById('task-program').value.trim(),
        args: splitArgs(document.getElementById('task-args').value),
        workdir: document.getElementById('task-workdir').value.trim(),
        env: parseEnvLines(document.getElementById('task-env').value),
        autostart: document.getElementById('task-autostart').checked,
        restart_on_crash: document.getElementById('task-restart').checked,
        stop_timeout_sec: parseInt(document.getElementById('task-timeout').value || '8', 10),
        restart_delay_sec: parseInt(document.getElementById('task-restart-delay').value || '2', 10),
        max_restart_count: parseInt(document.getElementById('task-max-restart-count').value || '0', 10)
      };
      const healthURL = document.getElementById('task-health-url').value.trim();
      payload.health_check_url = healthURL;
      payload.health_check_interval_sec = healthURL ? parseInt(document.getElementById('task-health-interval').value || '10', 10) : 0;
      payload.health_check_failure_threshold = healthURL ? parseInt(document.getElementById('task-health-threshold').value || '3', 10) : 0;

      if (!payload.program) {
        alert("请输入可执行程序");
        return;
      }

      const isEdit = !!editingTaskId;
      const url = isEdit ? '/api/tasks/' + editingTaskId : '/api/tasks';
      const method = isEdit ? 'PUT' : 'POST';
      pendingTaskFocusId = isEdit ? editingTaskId : id;

      const btn = document.getElementById('btn-save');
      const originalText = btn.innerHTML;
      btn.innerHTML = '保存中...';
      btn.disabled = true;

      const result = await api(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      btn.innerHTML = originalText;
      btn.disabled = false;

      if (result.code !== 0) {
        alert(result.msg || '保存失败');
        return;
      }

      closeModal();
      await loadTasks();
    }

    async function loadTasks() {
      const data = await api('/api/tasks');
      if (data && data.code === 0) {
        renderTasks(data.data || []);
      }
    }

    async function loadLogs() {
      // 只有当前在日志 Tab 时才去查日志接口
      if (!document.getElementById('tab-logs').classList.contains('active')) {
        return;
      }
      
      const taskId = document.getElementById('log-task').value;
      const follow = document.getElementById('log-follow').checked;
      const logsEl = document.getElementById('logs');
      if (!taskId) {
        setLogContent('请选择一个任务查看日志...');
        return;
      }
      
      const nearBottom = logsEl.scrollTop + logsEl.clientHeight >= logsEl.scrollHeight - 40;
      const url = taskId === SYSTEM_LOG_ID
        ? '/api/system-log?tail=400'
        : '/api/tasks/' + encodeURIComponent(taskId) + '/logs?tail=400';
      const data = await api(url);
      
      if (data && data.code === 0) {
        setLogContent((data.data && data.data.content) || '');
      } else {
        setLogContent('无法读取日志: ' + (data.msg || '未知错误'));
      }
      
      if (follow || nearBottom) {
        logsEl.scrollTop = logsEl.scrollHeight;
      }
    }

    function connectTaskStream() {
      if (typeof EventSource === 'undefined') {
        return;
      }
      if (tasksEventSource) {
        return;
      }

      tasksEventSource = new EventSource('/api/events/tasks');
      tasksEventSource.addEventListener('tasks', (event) => {
        try {
          const items = JSON.parse(event.data);
          renderTasks(Array.isArray(items) ? items : []);
        } catch (err) {
          console.error(err);
        }
      });
      tasksEventSource.onerror = () => {
        loadTasks();
      };
    }

    function disconnectLogStream() {
      currentLogStreamKey = '';
      if (logsEventSource) {
        logsEventSource.close();
        logsEventSource = null;
      }
    }

    function connectLogStream() {
      if (typeof EventSource === 'undefined') {
        return;
      }
      if (!document.getElementById('tab-logs').classList.contains('active')) {
        disconnectLogStream();
        return;
      }
      if (!document.getElementById('log-auto-refresh').checked) {
        disconnectLogStream();
        return;
      }

      const taskId = document.getElementById('log-task').value;
      if (!taskId) {
        disconnectLogStream();
        return;
      }

      const streamKey = taskId;
      if (logsEventSource && currentLogStreamKey === streamKey) {
        return;
      }

      disconnectLogStream();
      currentLogStreamKey = streamKey;
      const streamURL = taskId === SYSTEM_LOG_ID
        ? '/api/system-log-stream?tail=400'
        : '/api/tasks/' + encodeURIComponent(taskId) + '/logs-stream?tail=400';
      logsEventSource = new EventSource(streamURL);
      logsEventSource.addEventListener('logs', (event) => {
        try {
          const payload = JSON.parse(event.data);
          const logsEl = document.getElementById('logs');
          const follow = document.getElementById('log-follow').checked;
          const nearBottom = logsEl.scrollTop + logsEl.clientHeight >= logsEl.scrollHeight - 40;
          setLogContent(payload.content || '');
          if (follow || nearBottom) {
            logsEl.scrollTop = logsEl.scrollHeight;
          }
        } catch (err) {
          console.error(err);
        }
      });
      logsEventSource.onerror = () => {
        if (document.getElementById('tab-logs').classList.contains('active') && document.getElementById('log-auto-refresh').checked) {
          loadLogs();
        }
      };
    }

    async function clearLogs() {
      const taskId = document.getElementById('log-task').value;
      if (!taskId) return;
      if (!confirm('确认清空该任务的日志吗？')) return;
      
      const url = taskId === SYSTEM_LOG_ID
        ? '/api/system-log-clear'
        : '/api/tasks/' + encodeURIComponent(taskId) + '/clear-logs';
      const result = await api(url, { method: 'POST' });
      if (result.code !== 0) {
        alert(result.msg || '清空日志失败');
        return;
      }
      setLogContent('');
      await loadLogs();
    }

    function exportTasks() {
      window.location.href = '/api/tasks-export';
    }

    async function importTasks(file) {
      const text = await file.text();
      let payload;
      try {
        payload = JSON.parse(text);
      } catch (err) {
        alert('导入文件不是合法 JSON');
        return;
      }

      if (!Array.isArray(payload)) {
        alert('导入文件必须是任务数组');
        return;
      }

      if (!confirm('导入会覆盖当前任务列表，且要求先停止所有任务。是否继续？')) {
        return;
      }

      const result = await api('/api/tasks-import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (result.code !== 0) {
        alert(result.msg || '导入失败');
        return;
      }
      await loadTasks();
      await loadLogs();
    }

    function downloadLogs() {
      const taskId = document.getElementById('log-task').value;
      if (!taskId) {
        alert('请选择一个任务');
        return;
      }
      window.location.href = taskId === SYSTEM_LOG_ID
        ? '/api/system-log-download'
        : '/api/tasks/' + encodeURIComponent(taskId) + '/download-logs';
    }

    async function loadVersion() {
      const data = await api('/api/build-info');
      if (data && data.code === 0 && data.data && data.data.version) {
        document.getElementById('app-version').textContent = data.data.version;
      } else {
        document.getElementById('app-version').textContent = '未知版本';
      }
    }

    // Init
    document.getElementById('log-render-mode').value = currentLogRenderMode;
    loadVersion();
    loadTasks();
    loadAutoStartStatus();
    connectTaskStream();
    
    // Trigger task selection change
    document.getElementById('task-page-size').addEventListener('change', (event) => {
      currentTaskPageSize = parseInt(event.target.value || '10', 10);
      currentTaskPage = 1;
      renderTasks(currentTasks);
    });
    document.getElementById('task-search').addEventListener('input', (event) => {
      currentTaskSearch = String(event.target.value || '');
      currentTaskPage = 1;
      renderTasks(currentTasks);
    });
    document.getElementById('task-page-prev').addEventListener('click', () => {
      currentTaskPage = clampTaskPage(currentTaskPage - 1);
      renderTasks(currentTasks);
    });
    document.getElementById('task-page-next').addEventListener('click', () => {
      currentTaskPage = clampTaskPage(currentTaskPage + 1);
      renderTasks(currentTasks);
    });
    document.getElementById('log-task-filter').addEventListener('input', () => {
      populateLogTaskOptions();
      loadLogs();
      connectLogStream();
    });
    document.getElementById('log-task').addEventListener('change', () => {
      loadLogs();
      connectLogStream();
    });
    document.getElementById('log-render-mode').addEventListener('change', (event) => {
      currentLogRenderMode = event.target.value === 'plain' ? 'plain' : 'ansi';
      localStorage.setItem('log-render-mode', currentLogRenderMode);
      loadLogs();
    });
    document.getElementById('log-auto-refresh').addEventListener('change', () => {
      if (document.getElementById('log-auto-refresh').checked) {
        loadLogs();
        connectLogStream();
      } else {
        disconnectLogStream();
      }
    });
    document.getElementById('task-import-file').addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        await importTasks(file);
      } finally {
        event.target.value = '';
      }
    });
    document.getElementById('autostart-refresh').addEventListener('click', () => {
      loadAutoStartStatus();
    });
    document.getElementById('autostart-enable').addEventListener('click', () => {
      updateAutoStart('enable');
    });
    document.getElementById('autostart-disable').addEventListener('click', () => {
      updateAutoStart('disable');
    });
  </script>
</body>
</html>
