version: '3'

tasks:
  version:
    desc: Print version metadata used for builds
    cmds:
      - sh ./scripts/version.sh

  build:
    desc: Build release artifact to bin/
    cmds:
      - sh -c "mkdir -p ./bin && ./scripts/build.sh ./bin/tray-windows-amd64.exe windows amd64"

  build:current:
    desc: Build current host binary to bin/
    cmds:
      - sh -c "mkdir -p ./bin && ./scripts/build.sh ./bin/tray.exe"
