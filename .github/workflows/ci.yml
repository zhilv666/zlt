name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.goos }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Verify build script
        shell: bash
        run: |
          mkdir -p ./bin
          sh ./scripts/build.sh "./bin/zlt-${{ matrix.goos }}-${{ matrix.goarch }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

